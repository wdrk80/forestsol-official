<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Illustrations | Forestsol Official</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-image: url("images/backgrounds/illustrations-bg.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #f2f2f2;
    }

header {
  padding: 0;
  background: transparent;
  overflow: hidden;
}

.header-image {
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
  opacity: 0.96;
}

nav {
  position: sticky;
  top: 0;
  z-index: 10;
  text-align: center;
  padding: 16px;
  background: rgba(5, 8, 18, 0.78);
  border-bottom: 1px solid rgba(170, 150, 255, 0.45);
  backdrop-filter: blur(4px);
}

nav a {
  color: #fff;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
}

nav a:hover {
  color: #d8c7ff;
}

section {
  max-width: 1150px;
  margin: auto;
  padding: 46px 18px;
  min-height: 380px;
}

.gallery {
  columns: 3 260px;
  column-gap: 18px;
}

.item {
  break-inside: avoid;
  background: rgba(20, 18, 40, 0.42);
  border: 1px solid rgba(215, 200, 255, 0.55);
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 18px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.24);
  backdrop-filter: blur(2px);
}

.item img {
  width: 100%;
  border-radius: 12px;
  background: #000;
  display: block;
}

.item p {
  text-align: center;
  color: #ffffff;
  font-weight: bold;
  line-height: 1.5;
  margin: 12px 0 4px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.75);
}

.status {
  text-align: center;
  color: #ffffff;
  padding: 30px 18px;
  line-height: 1.8;
  background: rgba(20, 18, 40, 0.42);
  border: 1px solid rgba(215, 200, 255, 0.55);
  border-radius: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.24);
  backdrop-filter: blur(2px);
  text-shadow: 0 2px 8px rgba(0,0,0,0.75);
}

footer {
  text-align: center;
  padding: 30px 20px;
  background: rgba(3, 5, 10, 0.82);
  color: #ddd;
  font-size: 13px;
  line-height: 1.7;
  backdrop-filter: blur(3px);
}

@media (max-width: 768px) {
  body {
    background-attachment: scroll;
    background-position: center top;
  }

  nav a {
    display: inline-block;
    margin: 5px 8px;
  }

  .header-image {
    max-height: none;
  }
}

  </style>
</head>
<body>

<header>
  <img class="header-image" src="images/logos/illustrations-header.png" alt="Illustration Gallery">
</header>

<nav>
  <a href="index.html">メンバー紹介</a>
  <a href="thumbnails.html">サムネ置き場</a>
  <a href="illustrations.html">イラスト</a>
  <a href="terms.html">利用規約</a>
</nav>

<section>
  <div id="gallery" class="gallery">
    <div class="status">イラストを読み込み中...</div>
  </div>
</section>

<footer>
  © Forestsol / ウォルフィ<br>
  Unauthorized use prohibited.
</footer>

<script>
  const gallery = document.getElementById("gallery");

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function loadIllustrations() {
    try {
      const response = await fetch("data/illustrations.json?time=" + Date.now());

      if (!response.ok) {
        gallery.innerHTML = '<div class="status">まだイラストがありません。管理ページからアップロードしてください。</div>';
        return;
      }

      const items = await response.json();

      if (!Array.isArray(items) || items.length === 0) {
        gallery.innerHTML = '<div class="status">まだイラストがありません。管理ページからアップロードしてください。</div>';
        return;
      }

      gallery.innerHTML = "";

      items.forEach(function(item) {
        const title = item.title || "イラスト";
        const image = item.image || "";

        if (!image) return;

        const card = document.createElement("div");
        card.className = "item";

        card.innerHTML =
          '<img src="' + escapeHtml(image) + '" alt="' + escapeHtml(title) + '">' +
          '<p>' + escapeHtml(title) + '</p>';

        gallery.appendChild(card);
      });

    } catch (error) {
      gallery.innerHTML = '<div class="status">イラストの読み込みに失敗しました。</div>';
    }
  }

  loadIllustrations();
</script>

</body>
</html>
