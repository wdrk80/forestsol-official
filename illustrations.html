  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background:
        linear-gradient(rgba(7, 10, 22, 0.18), rgba(7, 10, 22, 0.72)),
        url("images/backgrounds/illustrations-bg.png");
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      color: #f2f2f2;
    }

    header {
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    .header-image {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      opacity: 0.92;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      text-align: center;
      padding: 16px;
      background: rgba(5, 8, 18, 0.92);
      border-bottom: 1px solid rgba(170, 150, 255, 0.35);
      backdrop-filter: blur(4px);
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    nav a:hover {
      color: #d8c7ff;
    }

    section {
      max-width: 1150px;
      margin: auto;
      padding: 46px 18px;
      min-height: 380px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .item {
      background: rgba(20, 18, 40, 0.72);
      border: 1px solid rgba(190, 170, 255, 0.38);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      backdrop-filter: blur(4px);
    }

    .item img {
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      border-radius: 12px;
      background: #000;
      display: block;
      cursor: pointer;
    }

    .item p {
      text-align: center;
      color: #eee6ff;
      font-weight: bold;
      line-height: 1.5;
      margin: 12px 0 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    .status {
      text-align: center;
      color: #eee6ff;
      padding: 30px 18px;
      line-height: 1.8;
      background: rgba(20, 18, 40, 0.72);
      border: 1px solid rgba(190, 170, 255, 0.38);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      backdrop-filter: blur(4px);
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      background: rgba(3, 5, 10, 0.95);
      color: #ccc;
      font-size: 13px;
      line-height: 1.7;
    }

    .image-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      justify-content: center;
      align-items: center;
      padding: 14px;
    }

    .image-modal img {
      max-width: 96vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      body {
        background-attachment: scroll;
      }

      nav {
        padding: 12px 6px;
      }

      nav a {
        display: inline-block;
        margin: 5px 8px;
        font-size: 13px;
      }

      .header-image {
        max-height: none;
      }

      section {
        padding: 28px 8px;
      }

      .gallery {
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .item {
        padding: 5px;
        border-radius: 10px;
      }

      .item img {
        border-radius: 8px;
      }

      .item p {
        font-size: 11px;
        margin: 6px 0 2px;
        line-height: 1.3;
      }
    }
  </style>

</head>

<body>

<header>
  <img class="header-image" src="images/logos/illustrations-header.png" alt="Illustration Gallery">
</header>

<nav>
  <a href="index.html">メンバー紹介</a>
  <a href="thumbnails.html">サムネ置き場</a>
  <a href="illustrations.html">イラスト</a>
  <a href="terms.html">利用規約</a>
</nav>

<section>
  <div id="gallery" class="gallery">
    <div class="status">イラストを読み込み中...</div>
  </div>
</section>

<footer>
  © Forestsol / ウォルフィ<br>
  Unauthorized use prohibited.
</footer>

<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImage" src="" alt="拡大画像">
</div>

<script>
  const gallery = document.getElementById("gallery");

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function openImage(src) {
    const modal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");

    modalImage.src = src;
    modal.style.display = "flex";
  }

  function closeImage() {
    const modal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");

    modal.style.display = "none";
    modalImage.src = "";
  }

  async function loadIllustrations() {
    try {
      const response = await fetch("data/illustrations.json?time=" + Date.now());

      if (!response.ok) {
        gallery.innerHTML = '<div class="status">まだイラストがありません。管理ページからアップロードしてください。</div>';
        return;
      }

      const items = await response.json();

      if (!Array.isArray(items) || items.length === 0) {
        gallery.innerHTML = '<div class="status">まだイラストがありません。管理ページからアップロードしてください。</div>';
        return;
      }

      gallery.innerHTML = "";

      items.forEach(function(item) {
        const title = item.title || "イラスト";
        const image = item.image || "";

        if (!image) return;

        const card = document.createElement("div");
        card.className = "item";

        card.innerHTML =
          '<img src="' + escapeHtml(image) + '" alt="' + escapeHtml(title) + '" onclick="openImage(this.src)">' +
          '<p>' + escapeHtml(title) + '</p>';

        gallery.appendChild(card);
      });

    } catch (error) {
      gallery.innerHTML = '<div class="status">イラストの読み込みに失敗しました。</div>';
    }
  }

  loadIllustrations();
</script>

</body>
</html>
