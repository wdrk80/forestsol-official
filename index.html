<script>
  const themeSong = document.getElementById("themeSong");
  const musicToggleButton = document.getElementById("musicToggleButton");

  let isPlaying = false;

  function setPlayingState(playing) {
    isPlaying = playing;

    if (playing) {
      musicToggleButton.src = "images/buttons/stop-button.png";
      musicToggleButton.alt = "停止";
    } else {
      musicToggleButton.src = "images/buttons/play-button.png";
      musicToggleButton.alt = "再生";
    }
  }

  function toggleTheme() {
    if (isPlaying) {
      themeSong.pause();
      setPlayingState(false);
    } else {
      themeSong.volume = 0.45;
      themeSong.play()
        .then(() => {
          setPlayingState(true);
        })
        .catch(() => {
          setPlayingState(false);
        });
    }
  }

  window.addEventListener("load", function() {
    themeSong.volume = 0.35;

    themeSong.play()
      .then(() => {
        setPlayingState(true);
      })
      .catch(() => {
        setPlayingState(false);
      });
  });
</script>

<script>
  const API_KEY = "AIzaSyA3SrB9WdQG7JCPkAWlpcCZPfa5_iLk8K4";
  const CHANNEL_HANDLE = "Forest-Sol";

  const youtubePlayer = document.getElementById("youtubePlayer");
  const youtubeVideoList = document.getElementById("youtubeVideoList");
  const youtubeStatus = document.getElementById("youtubeStatus");

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function loadForestsolVideos() {
    if (API_KEY === "ここに今使ってるYouTube APIキー" || API_KEY.trim() === "") {
      youtubeStatus.innerHTML = "APIキーがまだ設定されていません。";
      return;
    }

    try {
      youtubeStatus.innerHTML = "チャンネル情報を読み込み中...";

      const channelUrl =
        "https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=" +
        CHANNEL_HANDLE +
        "&key=" +
        API_KEY;

      const channelRes = await fetch(channelUrl);
      const channelData = await channelRes.json();

      if (!channelRes.ok) {
        youtubeStatus.innerHTML =
          "チャンネル情報を取得できませんでした。<br><br>" +
          "Googleの返答：<br><pre style='white-space:pre-wrap;text-align:left;'>" +
          escapeHtml(JSON.stringify(channelData, null, 2)) +
          "</pre>";

    return;
  }

  if (!channelData.items || channelData.items.length === 0) {
    youtubeStatus.innerHTML =
      "チャンネルが見つかりませんでした。@Forest-Sol のハンドル名を確認してください。";
    return;
  }

  const uploadsPlaylistId =
    channelData.items[0].contentDetails.relatedPlaylists.uploads;

  youtubeStatus.innerHTML = "動画一覧を読み込み中...";

  const videosUrl =
    "https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=" +
    uploadsPlaylistId +
    "&maxResults=6&key=" +
    API_KEY;

  const videosRes = await fetch(videosUrl);
  const videosData = await videosRes.json();

  if (!videosRes.ok) {
    youtubeStatus.innerHTML =
      "動画一覧を取得できませんでした。<br><br>" +
      "Googleの返答：<br><pre style='white-space:pre-wrap;text-align:left;'>" +
      escapeHtml(JSON.stringify(videosData, null, 2)) +
      "</pre>";
    return;
  }

  if (!videosData.items || videosData.items.length === 0) {
    youtubeStatus.innerHTML =
      "公開動画が見つかりませんでした。公開動画が0本、または動画が非公開の可能性があります。";
    return;
  }

  youtubeVideoList.innerHTML = "";
  youtubeStatus.style.display = "none";

  videosData.items.forEach(function(item, index) {
    const videoId = item.snippet.resourceId.videoId;
    const title = item.snippet.title;

    const thumbnail =
      item.snippet.thumbnails.high?.url ||
      item.snippet.thumbnails.medium?.url ||
      item.snippet.thumbnails.default?.url;

    if (index === 0) {
      youtubePlayer.src = "https://www.youtube.com/embed/" + videoId;
    }

    const card = document.createElement("div");
    card.className = "youtube-video-card";

    card.innerHTML =
      '<img src="' + thumbnail + '" alt="' + escapeHtml(title) + '">' +
      '<p>' + escapeHtml(title) + '</p>';

    card.addEventListener("click", function() {
      youtubePlayer.src =
        "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
      document.getElementById("youtube").scrollIntoView({ behavior: "smooth" });
    });

    youtubeVideoList.appendChild(card);
  });

} catch (error) {
  youtubeStatus.innerHTML =
    "YouTube読み込み中にエラーが出ました。<br><br>" +
    "<pre style='white-space:pre-wrap;text-align:left;'>" +
    escapeHtml(error) +
    "</pre>";
}

}

loadForestsolVideos(); </script>
