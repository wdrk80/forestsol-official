<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Admin | Forestsol Official</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #07100d;
      color: #f2f2f2;
    }

    header {
      text-align: center;
      padding: 60px 20px 35px;
      background: linear-gradient(135deg, #07100d, #123b2f, #0b1d18);
    }

    h1 {
      margin: 0;
      font-size: 36px;
      letter-spacing: 2px;
    }

    header p {
      color: #d8e8df;
      margin-top: 12px;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 40px 18px;
    }

    .box {
      background: #111c19;
      border: 1px solid #2d5147;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 22px;
    }

    h2 {
      margin-top: 0;
      color: #bfffe8;
    }

    .admin-link {
      display: block;
      margin: 12px 0;
      padding: 14px 18px;
      background: #1f6f58;
      color: #ffffff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }

    .admin-link:hover {
      background: #2b8b70;
    }

    .note {
      color: #cccccc;
      line-height: 1.8;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      background: #030505;
      color: #cccccc;
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>

<body>

<header>
  <h1>Forestsol Admin</h1>
  <p>管理者用ページ</p>
</header>

<main>

  <div class="box">
    <h2>画像をアップロード</h2>

    <a class="admin-link" href="https://github.com/wdrk80/forestsol-official/upload/main/images/illustrations" target="_blank">
      イラスト画像を追加
    </a>

    <a class="admin-link" href="https://github.com/wdrk80/forestsol-official/upload/main/images/thumbnails" target="_blank">
      サムネイル画像を追加
    </a>

    <a class="admin-link" href="https://github.com/wdrk80/forestsol-official/upload/main/images/members" target="_blank">
      メンバー画像を追加
    </a>
  </div>

  <div class="box">
    <h2>ページを編集</h2>

    <a class="admin-link" href="https://github.com/wdrk80/forestsol-official/edit/main/illustrations.html" target="_blank">
      イラストページを編集
    </a>

    <a class="admin-link" href="https://github.com/wdrk80/forestsol-official/edit/main/thumbnails.html" target="_blank">
      サムネイルページを編集
    </a>

    <a class="admin-link" href="https://github.com/wdrk80/forestsol-official/edit/main/index.html" target="_blank">
      メンバーページを編集
    </a>

    <a class="admin-link" href="https://github.com/wdrk80/forestsol-official/edit/main/terms.html" target="_blank">
      利用規約ページを編集
    </a>
  </div>

  <div class="box">
    <h2>注意</h2>
    <p class="note">
      このページはサイト上のメニューには表示しない管理用ページです。<br>
      ただし、完全なパスワード保護ページではありません。<br>
      実際に編集できるのは、GitHubにログインしていて、このリポジトリを編集できる管理者だけです。
    </p>
  </div>

</main>

<footer>
  © Forestsol / ウォルフィ雷尾. Unauthorized use prohibited.
</footer>

</body>
</html>
