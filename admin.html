<label for="title">タイトル</label>
<input id="title" type="text" placeholder="例：マイクラ配信用サムネ">

<label for="imageFile">画像ファイル</label>
<input id="imageFile" type="file" accept="image/png,image/jpeg,image/webp">

<div class="preview" id="preview"></div>

<button id="uploadButton" onclick="uploadImage()">
  アップロードする
</button>

<script>
  const WORKER_URL = "https://forestsol-upload-worker.foresutosoru.workers.dev/upload";

  const typeInput = document.getElementById("type");
  const titleInput = document.getElementById("title");
  const imageFileInput = document.getElementById("imageFile");
  const preview = document.getElementById("preview");
  const statusBox = document.getElementById("status");
  const uploadButton = document.getElementById("uploadButton");

  let selectedBase64 = "";
  let selectedFilename = "";

  imageFileInput.addEventListener("change", function() {
    const file = imageFileInput.files[0];

    selectedBase64 = "";
    selectedFilename = "";
    preview.innerHTML = "";

    if (!file) {
      statusBox.textContent = "画像を選んでください。";
      return;
    }

    selectedFilename = file.name;

    const reader = new FileReader();

    reader.onload = function(event) {
      selectedBase64 = event.target.result;
      preview.innerHTML = '<img src="' + selectedBase64 + '" alt="preview">';
      statusBox.textContent = "画像を読み込みました。アップロードできます。";
    };

    reader.onerror = function() {
      statusBox.textContent = "画像の読み込みに失敗しました。";
    };

    reader.readAsDataURL(file);
  });

  async function uploadImage() {
    if (!selectedBase64) {
      statusBox.textContent = "先に画像を選んでください。";
      return;
    }

    uploadButton.disabled = true;
    statusBox.textContent = "アップロード中...";

    const payload = {
      type: typeInput.value,
      title: titleInput.value.trim(),
      filename: selectedFilename,
      base64: selectedBase64
    };

    try {
      const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (!response.ok || !result.ok) {
        statusBox.textContent =
          "アップロード失敗\n\n" +
          JSON.stringify(result, null, 2);
        uploadButton.disabled = false;
        return;
      }

      statusBox.textContent =
        "アップロード成功！\n\n" +
        "画像： " + result.imagePath + "\n" +
        "データ： " + result.dataPath;

      titleInput.value = "";
      imageFileInput.value = "";
      selectedBase64 = "";
      selectedFilename = "";
      preview.innerHTML = "";

    } catch (error) {
      statusBox.textContent =
        "アップロード中にエラーが出ました。\n\n" +
        String(error);
    }

    uploadButton.disabled = false;
  }
</script>

</body>
