<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Forestsol Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #07100d;
      color: #f2f2f2;
    }

header {
  text-align: center;
  padding: 34px 18px;
  background: #030505;
  border-bottom: 1px solid #24463c;
}

h1 {
  margin: 0;
  font-size: 30px;
}

h2 {
  margin-top: 0;
  color: #d8e8df;
}

main {
  max-width: 900px;
  margin: 0 auto;
  padding: 34px 18px;
}

.admin-box {
  background: rgba(16, 24, 22, 0.95);
  border: 1px solid #2e4a42;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  margin-bottom: 26px;
}

label {
  display: block;
  margin-top: 18px;
  margin-bottom: 8px;
  font-weight: bold;
  color: #d8e8df;
}

input,
select {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #355f52;
  background: #050807;
  color: #ffffff;
  font-size: 15px;
}

button {
  margin-top: 16px;
  padding: 12px 18px;
  border: none;
  border-radius: 999px;
  background: #1f6f58;
  color: #ffffff;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #2c8a6d;
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.upload-button {
  width: 100%;
  margin-top: 24px;
  padding: 14px;
  font-size: 16px;
}

.rename-button {
  background: #365fa8;
  width: 100%;
  margin-top: 10px;
}

.rename-button:hover {
  background: #4778d1;
}

.move-button {
  background: #8a6a1f;
  width: 100%;
  margin-top: 10px;
}

.move-button:hover {
  background: #b88e29;
}

.delete-button {
  background: #8a1f1f;
  width: 100%;
  margin-top: 10px;
}

.delete-button:hover {
  background: #b92b2b;
}

.preview {
  margin-top: 18px;
  text-align: center;
}

.preview img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 14px;
  border: 1px solid #355f52;
  background: #000;
}

.status {
  margin-top: 18px;
  padding: 14px;
  border-radius: 12px;
  background: rgba(0,0,0,0.35);
  line-height: 1.7;
  white-space: pre-wrap;
}

.password-box {
  border-color: #4f7c68;
  background: rgba(20, 34, 30, 0.96);
}

.password-note {
  margin-top: 12px;
  font-size: 13px;
  color: #cccccc;
  line-height: 1.7;
}

.manage-controls {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 18px;
}

.manage-controls select {
  flex: 1;
}

.manage-controls button {
  margin-top: 0;
  white-space: nowrap;
}

.item-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}

.item-card {
  background: rgba(8, 14, 13, 0.88);
  border: 1px solid #2e4a42;
  border-radius: 14px;
  padding: 12px;
  overflow: hidden;
}

.item-card img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
  background: #000;
  border-radius: 10px;
}

.item-card p {
  margin: 10px 0 0;
  color: #d8e8df;
  font-weight: bold;
  line-height: 1.5;
  word-break: break-word;
}

.item-path {
  margin-top: 8px;
  font-size: 12px;
  color: #aaaaaa;
  word-break: break-all;
  line-height: 1.5;
}

.rename-input {
  margin-top: 10px;
  font-size: 14px;
}

.links {
  text-align: center;
  margin-top: 24px;
}

.links a {
  color: #95d8bd;
  margin: 0 8px;
  font-weight: bold;
  text-decoration: none;
}

.note {
  margin-top: 18px;
  color: #cccccc;
  font-size: 13px;
  line-height: 1.7;
}

@media (max-width: 640px) {
  .manage-controls {
    display: block;
  }

  .manage-controls button {
    width: 100%;
    margin-top: 12px;
  }
}

  </style>
</head>
<body>

<header>
  <h1>Forestsol Admin</h1>
</header>

<main>
  <div class="admin-box password-box">
    <h2>管理パスワード</h2>

<label for="adminPassword">管理パスワード</label>
<input id="adminPassword" type="password" placeholder="Cloudflareに設定したADMIN_PASSWORD">

<button onclick="savePassword()">
  このパスワードを使用
</button>

<button onclick="clearPassword()" style="background:#555;">
  パスワードを消す
</button>

<div class="password-note">
  このパスワードはブラウザ内だけに保存されます。<br>
  アップロード・タイトル変更・移動・削除の時にWorker側で確認されます。
</div>

<div class="status" id="passwordStatus">
  管理パスワードを入力してください。
</div>

  </div>

  <div class="admin-box">
    <h2>アップロード</h2>

<label for="type">アップロード先</label>
<select id="type">
  <option value="thumbnail">サムネ置き場</option>
  <option value="illustration">イラスト</option>
</select>

<label for="title">タイトル</label>
<input id="title" type="text" placeholder="例：マイクラ配信用サムネ">

<label for="imageFile">画像ファイル</label>
<input id="imageFile" type="file" accept="image/png,image/jpeg,image/webp">

<div class="preview" id="preview"></div>

<button id="uploadButton" class="upload-button" onclick="uploadImage()">
  アップロードする
</button>

<div class="status" id="status">
  画像を選んでアップロードしてください。
</div>

<div class="note">
  対応形式：PNG / JPG / WEBP<br>
  アップロードすると、GitHubの images フォルダと data JSON に自動保存されます。
</div>

  </div>

  <div class="admin-box">
    <h2>管理・タイトル変更・移動・削除</h2>

<div class="manage-controls">
  <select id="manageType">
    <option value="thumbnail">サムネ置き場</option>
    <option value="illustration">イラスト</option>
  </select>

  <button onclick="loadManageList()">
    一覧を更新
  </button>
</div>

<div class="status" id="manageStatus">
  一覧を読み込んでください。
</div>

<div id="itemList" class="item-list"></div>

  </div>

  <div class="links">
    <a href="index.html">トップへ</a>
    <a href="thumbnails.html">サムネ置き場</a>
    <a href="illustrations.html">イラスト</a>
  </div>
</main>

<script>
  const WORKER_URL = "https://forestsol-upload-worker.foresutosoru.workers.dev";

  const typeInput = document.getElementById("type");
  const titleInput = document.getElementById("title");
  const imageFileInput = document.getElementById("imageFile");
  const preview = document.getElementById("preview");
  const statusBox = document.getElementById("status");
  const uploadButton = document.getElementById("uploadButton");

  const manageTypeInput = document.getElementById("manageType");
  const manageStatus = document.getElementById("manageStatus");
  const itemList = document.getElementById("itemList");

  const adminPasswordInput = document.getElementById("adminPassword");
  const passwordStatus = document.getElementById("passwordStatus");

  let selectedBase64 = "";
  let selectedFilename = "";

  function getPassword() {
    return localStorage.getItem("forestsol_admin_password") || "";
  }

  function savePassword() {
    const password = adminPasswordInput.value.trim();

    if (!password) {
      passwordStatus.textContent = "パスワードを入力してください。";
      return;
    }

    localStorage.setItem("forestsol_admin_password", password);
    passwordStatus.textContent = "管理パスワードを保存しました。";
  }

  function clearPassword() {
    localStorage.removeItem("forestsol_admin_password");
    adminPasswordInput.value = "";
    passwordStatus.textContent = "保存したパスワードを消しました。";
  }

  function requirePassword(statusTarget) {
    const password = getPassword();

    if (!password) {
      statusTarget.textContent = "先に管理パスワードを入力して「このパスワードを使用」を押してください。";
      return "";
    }

    return password;
  }

  window.addEventListener("load", function() {
    const savedPassword = getPassword();

    if (savedPassword) {
      adminPasswordInput.value = savedPassword;
      passwordStatus.textContent = "保存済みの管理パスワードがあります。";
    }
  });

  imageFileInput.addEventListener("change", function() {
    const file = imageFileInput.files[0];

    selectedBase64 = "";
    selectedFilename = "";
    preview.innerHTML = "";

    if (!file) {
      statusBox.textContent = "画像を選んでください。";
      return;
    }

    selectedFilename = file.name;

    const reader = new FileReader();

    reader.onload = function(event) {
      selectedBase64 = event.target.result;
      preview.innerHTML = '<img src="' + selectedBase64 + '" alt="preview">';
      statusBox.textContent = "画像を読み込みました。アップロードできます。";
    };

    reader.onerror = function() {
      statusBox.textContent = "画像の読み込みに失敗しました。";
    };

    reader.readAsDataURL(file);
  });

  async function uploadImage() {
    const password = requirePassword(statusBox);

    if (!password) return;

    if (!selectedBase64) {
      statusBox.textContent = "先に画像を選んでください。";
      return;
    }

    uploadButton.disabled = true;
    statusBox.textContent = "アップロード中...";

    const payload = {
      password: password,
      type: typeInput.value,
      title: titleInput.value.trim(),
      filename: selectedFilename,
      base64: selectedBase64
    };

    try {
      const response = await fetch(WORKER_URL + "/upload", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (!response.ok || !result.ok) {
        statusBox.textContent =
          "アップロード失敗\n\n" +
          JSON.stringify(result, null, 2);
        uploadButton.disabled = false;
        return;
      }

      statusBox.textContent =
        "アップロード成功！\n\n" +
        "画像： " + result.imagePath + "\n" +
        "データ： " + result.dataPath;

      titleInput.value = "";
      imageFileInput.value = "";
      selectedBase64 = "";
      selectedFilename = "";
      preview.innerHTML = "";

      manageTypeInput.value = typeInput.value;
      loadManageList();

    } catch (error) {
      statusBox.textContent =
        "アップロード中にエラーが出ました。\n\n" +
        String(error);
    }

    uploadButton.disabled = false;
  }

  async function loadManageList() {
    const type = manageTypeInput.value;
    const jsonPath =
      type === "thumbnail"
        ? "data/thumbnails.json"
        : "data/illustrations.json";

    itemList.innerHTML = "";
    manageStatus.textContent = "一覧を読み込み中...";

    try {
      const response = await fetch(jsonPath + "?time=" + Date.now());

      if (!response.ok) {
        manageStatus.textContent = "まだデータがありません。";
        return;
      }

      const items = await response.json();

      if (!Array.isArray(items) || items.length === 0) {
        manageStatus.textContent = "まだ画像がありません。";
        return;
      }

      manageStatus.textContent = items.length + "件見つかりました。";
      itemList.innerHTML = "";

      items.forEach(function(item) {
        const title = item.title || "無題";
        const image = item.image || "";

        if (!image) return;

        const card = document.createElement("div");
        card.className = "item-card";

        const img = document.createElement("img");
        img.src = image;
        img.alt = title;

        const titleText = document.createElement("p");
        titleText.textContent = title;

        const pathText = document.createElement("div");
        pathText.className = "item-path";
        pathText.textContent = image;

        const renameInput = document.createElement("input");
        renameInput.className = "rename-input";
        renameInput.type = "text";
        renameInput.value = title;
        renameInput.placeholder = "新しいタイトル";

        const renameButton = document.createElement("button");
        renameButton.className = "rename-button";
        renameButton.textContent = "タイトル変更";
        renameButton.onclick = function() {
          renameItem(type, image, renameInput.value);
        };

        const moveButton = document.createElement("button");
        moveButton.className = "move-button";
        moveButton.textContent =
          type === "thumbnail"
            ? "イラストへ移動"
            : "サムネ置き場へ移動";
        moveButton.onclick = function() {
          moveItem(type, image);
        };

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-button";
        deleteButton.textContent = "削除する";
        deleteButton.onclick = function() {
          deleteItem(type, image);
        };

        card.appendChild(img);
        card.appendChild(titleText);
        card.appendChild(pathText);
        card.appendChild(renameInput);
        card.appendChild(renameButton);
        card.appendChild(moveButton);
        card.appendChild(deleteButton);

        itemList.appendChild(card);
      });

    } catch (error) {
      manageStatus.textContent =
        "一覧の読み込みに失敗しました。\n\n" +
        String(error);
    }
  }

  async function renameItem(type, image, newTitle) {
    const password = requirePassword(manageStatus);

    if (!password) return;

    const cleanTitle = String(newTitle || "").trim();

    if (!cleanTitle) {
      manageStatus.textContent = "新しいタイトルを入力してください。";
      return;
    }

    manageStatus.textContent = "タイトル変更中...";

    try {
      const response = await fetch(WORKER_URL + "/rename", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          password: password,
          type: type,
          image: image,
          title: cleanTitle
        })
      });

      const result = await response.json();

      if (!response.ok || !result.ok) {
        manageStatus.textContent =
          "タイトル変更失敗\n\n" +
          JSON.stringify(result, null, 2);
        return;
      }

      manageStatus.textContent =
        "タイトル変更成功！\n\n" +
        result.newTitle;

      loadManageList();

    } catch (error) {
      manageStatus.textContent =
        "タイトル変更中にエラーが出ました。\n\n" +
        String(error);
    }
  }

  async function moveItem(type, image) {
    const password = requirePassword(manageStatus);

    if (!password) return;

    const targetName =
      type === "thumbnail"
        ? "イラスト"
        : "サムネ置き場";

    const ok = confirm("この画像を「" + targetName + "」へ移動しますか？\n\n" + image);

    if (!ok) {
      return;
    }

    manageStatus.textContent = "移動中...";

    try {
      const response = await fetch(WORKER_URL + "/move", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          password: password,
          type: type,
          image: image
        })
      });

      const result = await response.json();

      if (!response.ok || !result.ok) {
        manageStatus.textContent =
          "移動失敗\n\n" +
          JSON.stringify(result, null, 2);
        return;
      }

      manageStatus.textContent =
        "移動成功！\n\n" +
        "移動前： " + result.oldImagePath + "\n" +
        "移動後： " + result.newImagePath;

      loadManageList();

    } catch (error) {
      manageStatus.textContent =
        "移動中にエラーが出ました。\n\n" +
        String(error);
    }
  }

  async function deleteItem(type, image) {
    const password = requirePassword(manageStatus);

    if (!password) return;

    const ok = confirm("この画像を削除しますか？\n\n" + image);

    if (!ok) {
      return;
    }

    manageStatus.textContent = "削除中...";

    try {
      const response = await fetch(WORKER_URL + "/delete", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          password: password,
          type: type,
          image: image
        })
      });

      const result = await response.json();

      if (!response.ok || !result.ok) {
        manageStatus.textContent =
          "削除失敗\n\n" +
          JSON.stringify(result, null, 2);
        return;
      }

      manageStatus.textContent =
        "削除成功！\n\n" +
        result.imagePath;

      loadManageList();

    } catch (error) {
      manageStatus.textContent =
        "削除中にエラーが出ました。\n\n" +
        String(error);
    }
  }

  loadManageList();
</script>

</body>
</html>
