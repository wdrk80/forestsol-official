  <meta charset="UTF-8">

<meta name="twitter:image" content="https://forestsol.jp/images/logos/main-header.png">

  <link rel="canonical" href="https://forestsol.jp/thumbnails.html">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background:
        linear-gradient(rgba(5, 5, 8, 0.20), rgba(5, 5, 8, 0.78)),
        url("images/backgrounds/thumbnails-bg.png");
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      color: #f2f2f2;
    }

    header {
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    .header-image {
      width: 100%;
      height: auto;
      display: block;
      max-height: 430px;
      object-fit: cover;
      opacity: 0.94;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      text-align: center;
      padding: 16px;
      background: rgba(5, 5, 8, 0.94);
      border-bottom: 1px solid rgba(255, 45, 45, 0.35);
      backdrop-filter: blur(4px);
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    nav a:hover {
      color: #ff5a5a;
    }

    section {
      max-width: 1150px;
      margin: auto;
      padding: 46px 18px;
      min-height: 380px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .item {
      background: rgba(12, 12, 16, 0.76);
      border: 1px solid rgba(255, 60, 60, 0.34);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .item:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 90, 90, 0.7);
    }

    .item img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 12px;
      background: #000;
      display: block;
      cursor: pointer;
    }

    .item p {
      text-align: center;
      color: #f3f3f3;
      font-weight: bold;
      line-height: 1.5;
      margin: 12px 0 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    .status {
      text-align: center;
      color: #f3f3f3;
      padding: 30px 18px;
      line-height: 1.8;
      background: rgba(12, 12, 16, 0.76);
      border: 1px solid rgba(255, 60, 60, 0.34);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      background: rgba(3, 3, 5, 0.96);
      color: #ccc;
      font-size: 13px;
      line-height: 1.7;
    }

    .image-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      justify-content: center;
      align-items: center;
      padding: 14px;
    }

    .image-modal img {
      max-width: 96vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      body {
        background-attachment: scroll;
      }

      nav {
        padding: 12px 6px;
      }

      nav a {
        display: inline-block;
        margin: 5px 8px;
        font-size: 13px;
      }

      .header-image {
        max-height: none;
      }

      section {
        padding: 28px 8px;
      }

      .gallery {
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .item {
        padding: 5px;
        border-radius: 10px;
      }

      .item:hover {
        transform: none;
      }

      .item img {
        border-radius: 8px;
      }

      .item p {
        font-size: 11px;
        margin: 6px 0 2px;
        line-height: 1.3;
      }
    }
  </style>

</head>

<body>

<header>
  <img class="header-image" src="images/logos/thumbnails-header.png" alt="Thumbnail Gallery">
</header>

<nav>
  <a href="index.html">メンバー紹介</a>
  <a href="thumbnails.html">サムネ置き場</a>
  <a href="illustrations.html">イラスト</a>
  <a href="terms.html">利用規約</a>
</nav>

<section>
  <div id="gallery" class="gallery">
    <div class="status">サムネイルを読み込み中...</div>
  </div>
</section>

<footer>
  © Forestsol / ウォルフィ<br>
  Unauthorized use prohibited.
</footer>

<div id="imageModal" class="image-modal" onclick="closeImage()">
  <img id="modalImage" src="" alt="拡大画像">
</div>

<script>
  const gallery = document.getElementById("gallery");

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function openImage(src) {
    const modal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");

    modalImage.src = src;
    modal.style.display = "flex";
  }

  function closeImage() {
    const modal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");

    modal.style.display = "none";
    modalImage.src = "";
  }

  async function loadThumbnails() {
    try {
      const response = await fetch("data/thumbnails.json?time=" + Date.now());

      if (!response.ok) {
        gallery.innerHTML = '<div class="status">まだサムネイルがありません。管理ページからアップロードしてください。</div>';
        return;
      }

      const items = await response.json();

      if (!Array.isArray(items) || items.length === 0) {
        gallery.innerHTML = '<div class="status">まだサムネイルがありません。管理ページからアップロードしてください。</div>';
        return;
      }

      gallery.innerHTML = "";

      items.forEach(function(item) {
        const title = item.title || "サムネイル";
        const image = item.image || "";

        if (!image) return;

        const card = document.createElement("div");
        card.className = "item";

        card.innerHTML =
          '<img src="' + escapeHtml(image) + '" alt="' + escapeHtml(title) + '" onclick="openImage(this.src)">' +
          '<p>' + escapeHtml(title) + '</p>';

        gallery.appendChild(card);
      });

    } catch (error) {
      gallery.innerHTML = '<div class="status">サムネイルの読み込みに失敗しました。</div>';
    }
  }

  loadThumbnails();
</script>

</body>
</html>
