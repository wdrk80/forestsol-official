<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フォレストソル秘密基地</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background:
        linear-gradient(rgba(2, 6, 5, 0.35), rgba(2, 6, 5, 0.82)),
        url("images/backgrounds/main-bg.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #f2f2f2;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 34px 16px 18px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.8);
    }

    .subtitle {
      margin-top: 12px;
      line-height: 1.8;
      color: #d8e8df;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .game-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .game-area {
      position: relative;
      width: 100%;
      height: 560px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(149, 216, 189, 0.5);
      background:
        radial-gradient(circle at 30% 20%, rgba(149,216,189,0.15), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(100,160,255,0.13), transparent 30%),
        rgba(0, 0, 0, 0.35);
      box-shadow: 0 14px 36px rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
    }

    .hint {
      text-align: center;
      margin: 14px 0 18px;
      color: #cfeee1;
      line-height: 1.7;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .score {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #95d8bd;
      margin-bottom: 14px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .character {
      position: absolute;
      width: 115px;
      height: 115px;
      object-fit: contain;
      cursor: pointer;
      opacity: 0.72;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.55));
      transition: transform 0.18s ease, opacity 0.18s ease, filter 0.18s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .character:hover {
      opacity: 1;
      transform: scale(1.08);
      filter: drop-shadow(0 0 18px rgba(149,216,189,0.9));
    }

    .character.found {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.4) rotate(8deg);
    }

    .message {
      text-align: center;
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(149, 216, 189, 0.35);
      line-height: 1.8;
      min-height: 58px;
      white-space: pre-wrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .clear-box {
      display: none;
      margin-top: 22px;
      padding: 24px;
      text-align: center;
      border-radius: 22px;
      background: rgba(12, 28, 24, 0.92);
      border: 1px solid #95d8bd;
      box-shadow: 0 0 28px rgba(149,216,189,0.25);
      line-height: 1.9;
    }

    .clear-box h2 {
      margin: 0 0 12px;
      color: #95d8bd;
    }

    .buttons {
      text-align: center;
      margin: 22px 0 40px;
    }

    button,
    a.button {
      display: inline-block;
      margin: 6px;
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      background: #1f6f58;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.28);
    }

    button:hover,
    a.button:hover {
      background: #2c8a6d;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 26px;
      }

      .game-area {
        height: 480px;
        border-radius: 18px;
      }

      .character {
        width: 82px;
        height: 82px;
      }
    }

    @media (max-width: 430px) {
      .game-wrap {
        padding: 12px;
      }

      .game-area {
        height: 430px;
      }

      .character {
        width: 70px;
        height: 70px;
      }

      .subtitle,
      .hint,
      .message,
      .clear-box {
        font-size: 14px;
      }
    }
  </style>

</head>

<body>
  <header>
    <h1>フォレストソル秘密基地</h1>
    <div class="subtitle">
      森の奥に隠れた3匹を見つけよう。<br>
      全員見つけると、秘密の称号が手に入るよ。
    </div>
  </header>

  <main class="game-wrap">
    <div class="score" id="score">見つけた数：0 / 3</div>

<div class="hint">
  ヒント：少しだけ見えているキャラをタップ！
</div>

<div class="game-area" id="gameArea">
  <img class="character" id="yoshi" src="images/members/yoshi.png" alt="YOSHI" data-name="YOSHI">
  <img class="character" id="wolfy" src="images/members/wolfy.png" alt="ウォルフィ" data-name="ウォルフィ">
  <img class="character" id="kiara" src="images/members/kiara.png" alt="キアラ" data-name="キアラ">
</div>

<div class="message" id="message">
  森のどこかに、YOSHI・ウォルフィ・キアラが隠れている……
</div>

<div class="clear-box" id="clearBox">
  <h2>クリア！</h2>
  <p>
    3匹全員を見つけた！<br>
    称号：森の扉を開いた者<br>
    ようこそ、フォレストソル秘密基地へ。
  </p>
</div>

<div class="buttons">
  <button onclick="resetGame()">もう一度探す</button>
  <a class="button" href="index.html">トップへ戻る</a>
</div>

  </main>

  <script>
    const characters = [
      {
        id: "yoshi",
        name: "YOSHI",
        messages: [
          "YOSHIを見つけた！\n「お、よく見つけたな！」",
          "YOSHI発見！\n「隠れるのは苦手じゃないぞ！」"
        ]
      },
      {
        id: "wolfy",
        name: "ウォルフィ",
        messages: [
          "ウォルフィを見つけた！\n「ここは秘密だよ。誰にも言っちゃダメだからね」",
          "ウォルフィ発見！\n「へへ、見つかっちゃった」"
        ]
      },
      {
        id: "kiara",
        name: "キアラ",
        messages: [
          "キアラを見つけた！\n「まあ、コーヒーでも飲んでいきな」",
          "キアラ発見！\n「よく見つけたね。なかなかやるじゃん」"
        ]
      }
    ];

    const positions = [
      { left: 8, top: 64, rotate: -8 },
      { left: 42, top: 18, rotate: 5 },
      { left: 76, top: 58, rotate: 9 }
    ];

    let foundCount = 0;

    const score = document.getElementById("score");
    const message = document.getElementById("message");
    const clearBox = document.getElementById("clearBox");

    function shuffle(array) {
      const copy = array.slice();

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }

      return copy;
    }

    function setupGame() {
      foundCount = 0;
      score.textContent = "見つけた数：0 / 3";
      message.textContent = "森のどこかに、YOSHI・ウォルフィ・キアラが隠れている……";
      clearBox.style.display = "none";

      const shuffledPositions = shuffle(positions);

      characters.forEach(function(character, index) {
        const element = document.getElementById(character.id);
        const position = shuffledPositions[index];

        element.classList.remove("found");
        element.style.left = position.left + "%";
        element.style.top = position.top + "%";
        element.style.transform = "rotate(" + position.rotate + "deg)";

        element.onclick = function() {
          findCharacter(character, element);
        };
      });
    }

    function findCharacter(character, element) {
      if (element.classList.contains("found")) {
        return;
      }

      element.classList.add("found");
      foundCount++;

      score.textContent = "見つけた数：" + foundCount + " / 3";

      const randomMessage =
        character.messages[Math.floor(Math.random() * character.messages.length)];

      message.textContent = randomMessage;

      if (foundCount >= 3) {
        message.textContent =
          "3匹全員見つけた！\n森の奥の秘密基地が開いた……";
        clearBox.style.display = "block";
      }
    }

    function resetGame() {
      setupGame();
    }

    setupGame();
  </script>

</body>
</html>
