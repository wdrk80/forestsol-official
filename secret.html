<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フォレストソル秘密基地</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background:
        linear-gradient(rgba(5, 12, 10, 0.62), rgba(5, 12, 10, 0.88)),
        url("images/backgrounds/main-bg.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #f2f2f2;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 24px 14px 16px;
      background:
        linear-gradient(rgba(3, 8, 6, 0.72), rgba(3, 8, 6, 0.90)),
        url("images/backgrounds/main-bg.png");
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid rgba(149, 216, 189, 0.22);
      box-shadow: 0 10px 30px rgba(0,0,0,0.32);
    }

    h1 {
      margin: 0;
      font-size: 31px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.75);
    }

    .subtitle {
      margin-top: 10px;
      line-height: 1.75;
      color: #d8e8df;
      font-size: 14px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    .status-area {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .score {
      font-weight: bold;
      color: #95d8bd;
      line-height: 1.6;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .buttons {
      text-align: right;
      white-space: nowrap;
    }

    button,
    a.button {
      display: inline-block;
      margin: 3px;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: #1f6f58;
      color: #ffffff;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(0,0,0,0.3);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover,
    a.button:hover {
      background: #2c8a6d;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    .target-list {
      max-width: 1180px;
      margin: 0 auto 12px;
      padding: 0 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .target {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px;
      border-radius: 14px;
      background: rgba(16, 27, 24, 0.92);
      border: 1px solid rgba(149, 216, 189, 0.20);
      font-size: 13px;
      font-weight: bold;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    }

    .target img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(0,0,0,0.35);
      padding: 4px;
    }

    .target.found {
      color: #95d8bd;
      border-color: rgba(149,216,189,0.65);
      box-shadow: 0 0 14px rgba(149,216,189,0.25);
      background: rgba(20, 38, 33, 0.96);
    }

    .map-wrap {
      width: calc(100vw - 24px);
      height: calc(100vh - 235px);
      min-height: 430px;
      margin: 0 auto 14px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(149, 216, 189, 0.36);
      background: #000;
      box-shadow: 0 14px 38px rgba(0,0,0,0.5);
      position: relative;
    }

    .map-viewport {
      width: 100%;
      height: 100%;
      overflow: auto;
      cursor: grab;
      scroll-behavior: smooth;
      touch-action: pan-x pan-y;
      -webkit-overflow-scrolling: touch;
    }

    .map-viewport.dragging {
      cursor: grabbing;
      scroll-behavior: auto;
    }

    .map-stage {
      position: relative;
      width: 2200px;
      height: 1238px;
      background-image: url("images/backgrounds/secret-map.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform-origin: top left;
    }

    .hidden-character {
      position: absolute;
      width: 68px;
      height: 68px;
      object-fit: contain;
      cursor: pointer;
      opacity: 0.92;
      filter:
        brightness(0.80)
        saturate(0.92)
        contrast(0.97)
        drop-shadow(0 2px 4px rgba(0,0,0,0.58));
      transition:
        transform 0.18s ease,
        opacity 0.18s ease,
        filter 0.18s ease;
      user-select: none;
      -webkit-user-drag: none;
      z-index: 5;
    }

    .hidden-character:hover {
      opacity: 1;
      filter:
        brightness(1.05)
        saturate(1.10)
        contrast(1.05)
        drop-shadow(0 0 12px rgba(149,216,189,0.92));
    }

    .hidden-character.found {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.8) rotate(10deg);
    }

    .sparkle {
      position: absolute;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 6;
      background: radial-gradient(circle, rgba(149,216,189,0.95), rgba(149,216,189,0.25), transparent 70%);
      animation: sparkle 0.6s ease forwards;
    }

    @keyframes sparkle {
      from {
        opacity: 1;
        transform: scale(0.25);
      }
      to {
        opacity: 0;
        transform: scale(1.7);
      }
    }

    .message {
      max-width: 1180px;
      margin: 0 auto 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(149,216,189,0.18);
      line-height: 1.75;
      white-space: pre-wrap;
      box-shadow: 0 10px 22px rgba(0,0,0,0.20);
    }

    /* クリア報酬エリア */
    .clear-box {
      display: none;
      width: min(1560px, calc(100vw - 24px));
      margin: 0 auto 34px;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 18px 48px rgba(0,0,0,0.42);
    }

    .clear-box.show {
      display: block;
      animation: clearBoxShow 0.9s ease;
    }

    @keyframes clearBoxShow {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .clear-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(5, 18, 20, 0.38), rgba(5, 18, 20, 0.62)),
        url("images/backgrounds/secret-lake-bg.png");
      background-size: cover;
      background-position: center;
      filter: blur(6px) brightness(0.78) saturate(1.05);
      transform: scale(1.04);
      opacity: 0.96;
    }

    .clear-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.12), transparent 40%),
        linear-gradient(rgba(7, 16, 14, 0.28), rgba(7, 16, 14, 0.52));
      pointer-events: none;
    }

    .clear-content {
      position: relative;
      z-index: 2;
      padding: 28px 26px 32px;
      text-align: center;
    }

    .clear-badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: #fff7cc;
      font-weight: bold;
      letter-spacing: 0.04em;
      box-shadow: 0 0 18px rgba(255, 235, 155, 0.22);
      backdrop-filter: blur(3px);
    }

    .clear-title {
      margin: 0 0 10px;
      font-size: 40px;
      color: #ffffff;
      text-shadow:
        0 0 12px rgba(149,216,189,0.55),
        0 0 24px rgba(149,216,189,0.30),
        0 4px 12px rgba(0,0,0,0.55);
      animation: glowPulse 1.8s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% {
        transform: scale(1);
        text-shadow:
          0 0 12px rgba(149,216,189,0.55),
          0 0 24px rgba(149,216,189,0.30),
          0 4px 12px rgba(0,0,0,0.55);
      }
      50% {
        transform: scale(1.03);
        text-shadow:
          0 0 18px rgba(255,240,170,0.75),
          0 0 36px rgba(149,216,189,0.42),
          0 4px 12px rgba(0,0,0,0.55);
      }
    }

    .clear-text {
      max-width: 900px;
      margin: 0 auto 24px;
      line-height: 1.9;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
    }

    .reward-title {
      margin: 8px 0 18px;
      font-size: 24px;
      color: #f7fffb;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
    }

    .reward-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
    }

    .reward-card {
      background: rgba(4, 10, 10, 0.56);
      border-radius: 24px;
      padding: 16px 16px 20px;
      backdrop-filter: blur(6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    .reward-card img {
      width: 100%;
      display: block;
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.35);
      background: rgba(0,0,0,0.25);
    }

    .reward-card h3 {
      margin: 14px 0 12px;
      font-size: 21px;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
    }

    .download-button {
      display: inline-block;
      margin-top: 4px;
      padding: 14px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #43c49a, #2d9e77);
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .download-button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 26px rgba(0,0,0,0.32);
      opacity: 0.96;
    }

    .replay-area {
      margin-top: 22px;
    }

    .celebration-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .celebration-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background: radial-gradient(circle, rgba(255,255,255,0.28), rgba(255,255,255,0.0) 60%);
      opacity: 0;
    }

    .celebration-flash.show {
      animation: flashPop 0.8s ease;
    }

    @keyframes flashPop {
      0% { opacity: 0; }
      25% { opacity: 1; }
      100% { opacity: 0; }
    }

    .confetti {
      position: absolute;
      top: -40px;
      width: 12px;
      height: 24px;
      border-radius: 4px;
      opacity: 0.95;
      animation: fall linear forwards;
    }

    @keyframes fall {
      from {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      to {
        transform: translateY(110vh) rotate(520deg);
        opacity: 0;
      }
    }

    .ring-burst {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid rgba(255, 245, 190, 0.72);
      box-shadow: 0 0 28px rgba(149,216,189,0.45);
      animation: ringBurst 0.9s ease forwards;
      pointer-events: none;
    }

    @keyframes ringBurst {
      from {
        opacity: 0.9;
        transform: scale(0.25);
      }
      to {
        opacity: 0;
        transform: scale(1.55);
      }
    }

    @media (max-width: 900px) {
      .reward-grid {
        grid-template-columns: 1fr;
      }

      .clear-title {
        font-size: 32px;
      }

      .clear-text {
        font-size: 16px;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      .status-area {
        grid-template-columns: 1fr;
      }

      .buttons {
        text-align: center;
      }

      .target-list {
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .target {
        display: block;
        text-align: center;
        font-size: 11px;
        padding: 7px;
      }

      .target img {
        width: 34px;
        height: 34px;
        display: block;
        margin: 0 auto 4px;
      }

      .map-wrap {
        width: calc(100vw - 14px);
        height: calc(100vh - 255px);
        min-height: 390px;
        border-radius: 16px;
      }

      .hidden-character {
        width: 58px;
        height: 58px;
      }

      .message {
        margin-left: 7px;
        margin-right: 7px;
        font-size: 13px;
      }

      .clear-box {
        width: calc(100vw - 14px);
      }

      .clear-content {
        padding: 22px 12px 24px;
      }

      .clear-title {
        font-size: 28px;
      }

      .reward-title {
        font-size: 22px;
      }

      .download-button {
        font-size: 16px;
        padding: 13px 22px;
      }
    }
  </style>
</head>
<body>

  <script>
    if (sessionStorage.getItem("forestsol_secret_unlocked") !== "yes") {
      window.location.href = "secret_locked.html";
    }
  </script>

  <header>
    <h1>フォレストソル秘密基地</h1>
    <div class="subtitle">
      森の遊び場にまぎれた3匹を探そう。<br>
      マウスでドラッグ、スマホなら指でスライドできるよ。
    </div>
  </header>

  <div class="status-area">
    <div class="score" id="score">見つけた数：0 / 3</div>

    <div class="buttons">
      <button onclick="centerMap()">中央へ</button>
      <button onclick="resetGame()">もう一度</button>
      <a class="button" href="index.html">トップへ戻る</a>
    </div>
  </div>

  <div class="target-list">
    <div class="target" id="target-yoshi">
      <img src="images/members/yoshi.png" alt="YOSHI">
      YOSHIを探せ
    </div>

    <div class="target" id="target-wolfy">
      <img src="images/members/wolfy.png" alt="ウォルフィ">
      ウォルフィを探せ
    </div>

    <div class="target" id="target-kiara">
      <img src="images/members/kiara.png" alt="キアラ">
      キアラを探せ
    </div>
  </div>

  <div class="map-wrap">
    <div class="map-viewport" id="mapViewport">
      <div class="map-stage" id="mapStage">

        <img
          class="hidden-character"
          id="yoshi"
          src="images/members/yoshi.png"
          alt="YOSHI"
          data-name="YOSHI"
          data-target="target-yoshi"
        >

        <img
          class="hidden-character"
          id="wolfy"
          src="images/members/wolfy.png"
          alt="ウォルフィ"
          data-name="ウォルフィ"
          data-target="target-wolfy"
        >

        <img
          class="hidden-character"
          id="kiara"
          src="images/members/kiara.png"
          alt="キアラ"
          data-name="キアラ"
          data-target="target-kiara"
        >
      </div>
    </div>
  </div>

  <div class="message" id="message">
　　　　　　　　　 画像の中をドラッグして探索しよう。
  </div>

  <div class="clear-box" id="clearBox">
    <div class="clear-bg"></div>
    <div class="clear-overlay"></div>

    <div class="clear-content">
      <div class="clear-badge">SECRET CLEAR</div>
      <h2 class="clear-title">クリア！</h2>

      <div class="clear-text">
        3匹全員を見つけた！<br>
        ようこそ、フォレストソル秘密基地へ。
      </div>

      <h3 class="reward-title">秘密の壁紙報酬</h3>

      <div class="reward-grid">
        <div class="reward-card">
          <!-- PC壁紙画像のパス。名前が違う場合だけ変更 -->
          <img src="images/rewards/reward-pc.png" alt="PC用壁紙">
          <h3>PC用壁紙</h3>
          <a class="download-button" href="images/rewards/reward-pc.png" download>
            PC用をダウンロード
          </a>
        </div>

        <div class="reward-card">
          <!-- スマホ壁紙画像のパス。名前が違う場合だけ変更 -->
          <img src="images/rewards/reward-mobile.png" alt="スマホ用壁紙">
          <h3>スマホ用壁紙</h3>
          <a class="download-button" href="images/rewards/reward-mobile.png" download>
            スマホ用をダウンロード
          </a>
        </div>
      </div>

      <div class="replay-area">
        <button onclick="resetGame()">もう一度遊ぶ</button>
      </div>
    </div>
  </div>

  <div class="celebration-flash" id="celebrationFlash"></div>
  <div class="celebration-layer" id="celebrationLayer"></div>

  <script>
    const viewport = document.getElementById("mapViewport");
    const stage = document.getElementById("mapStage");
    const score = document.getElementById("score");
    const message = document.getElementById("message");
    const clearBox = document.getElementById("clearBox");
    const celebrationLayer = document.getElementById("celebrationLayer");
    const celebrationFlash = document.getElementById("celebrationFlash");

    let foundCount = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let scrollLeft = 0;
    let scrollTop = 0;
    let moved = false;

    const hideSpots = [
      { left: 4, top: 69 },
      { left: 8, top: 41 },
      { left: 12, top: 84 },
      { left: 16, top: 27 },
      { left: 21, top: 58 },
      { left: 25, top: 74 },
      { left: 30, top: 35 },
      { left: 34, top: 82 },
      { left: 39, top: 49 },
      { left: 44, top: 23 },
      { left: 49, top: 67 },
      { left: 54, top: 38 },
      { left: 58, top: 80 },
      { left: 63, top: 54 },
      { left: 68, top: 29 },
      { left: 72, top: 72 },
      { left: 77, top: 44 },
      { left: 82, top: 84 },
      { left: 87, top: 35 },
      { left: 91, top: 63 }
    ];

    function shuffleArray(array) {
      const copy = array.slice();

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }

      return copy;
    }

    function randomizeHiddenCharacters() {
      const shuffledSpots = shuffleArray(hideSpots);
      const hiddenCharacters = document.querySelectorAll(".hidden-character");

      hiddenCharacters.forEach(function(character, index) {
        const spot = shuffledSpots[index];

        character.style.left = spot.left + "%";
        character.style.top = spot.top + "%";

        const rotate = Math.floor(Math.random() * 20) - 10;
        const scale = 1.00 + Math.random() * 0.12;

        character.dataset.baseTransform =
          "rotate(" + rotate + "deg) scale(" + scale + ")";
        character.style.transform = character.dataset.baseTransform;
      });
    }

    function centerMap() {
      viewport.scrollLeft = (stage.offsetWidth - viewport.clientWidth) / 2;
      viewport.scrollTop = (stage.offsetHeight - viewport.clientHeight) / 2;
    }

    viewport.addEventListener("mousedown", function(event) {
      isDragging = true;
      moved = false;
      viewport.classList.add("dragging");

      startX = event.pageX - viewport.offsetLeft;
      startY = event.pageY - viewport.offsetTop;
      scrollLeft = viewport.scrollLeft;
      scrollTop = viewport.scrollTop;
    });

    viewport.addEventListener("mouseleave", function() {
      isDragging = false;
      viewport.classList.remove("dragging");
    });

    viewport.addEventListener("mouseup", function() {
      isDragging = false;
      viewport.classList.remove("dragging");
    });

    viewport.addEventListener("mousemove", function(event) {
      if (!isDragging) return;

      event.preventDefault();

      const x = event.pageX - viewport.offsetLeft;
      const y = event.pageY - viewport.offsetTop;

      const walkX = (x - startX) * 1.2;
      const walkY = (y - startY) * 1.2;

      if (Math.abs(walkX) > 4 || Math.abs(walkY) > 4) {
        moved = true;
      }

      viewport.scrollLeft = scrollLeft - walkX;
      viewport.scrollTop = scrollTop - walkY;
    });

    document.querySelectorAll(".hidden-character").forEach(function(character) {
      character.addEventListener("click", function(event) {
        if (moved) {
          event.preventDefault();
          return;
        }

        findCharacter(character);
      });
    });

    function findCharacter(character) {
      if (character.classList.contains("found")) return;

      character.classList.add("found");
      foundCount++;

      const name = character.dataset.name;
      const targetId = character.dataset.target;
      const target = document.getElementById(targetId);

      if (target) {
        target.classList.add("found");
      }

      score.textContent = "見つけた数：" + foundCount + " / 3";
      message.textContent = name + "を見つけた！\nまだ森のどこかに仲間が隠れている……";

      createSparkle(character);

      if (foundCount >= 3) {
        message.textContent = "3匹全員見つけた！\n森の奥の秘密基地が開いた……";
        showClearReward();
      }
    }

    function createSparkle(character) {
      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";

      const left = character.offsetLeft + character.offsetWidth / 2 - 37;
      const top = character.offsetTop + character.offsetHeight / 2 - 37;

      sparkle.style.left = left + "px";
      sparkle.style.top = top + "px";

      stage.appendChild(sparkle);

      const ring = document.createElement("div");
      ring.className = "ring-burst";
      ring.style.left = (character.offsetLeft + character.offsetWidth / 2 - 80) + "px";
      ring.style.top = (character.offsetTop + character.offsetHeight / 2 - 80) + "px";
      stage.appendChild(ring);

      setTimeout(function() {
        sparkle.remove();
        ring.remove();
      }, 900);
    }

    function showClearReward() {
      clearBox.classList.add("show");
      clearBox.scrollIntoView({ behavior: "smooth", block: "start" });
      playCelebration();
    }

    function playCelebration() {
      celebrationFlash.classList.remove("show");
      void celebrationFlash.offsetWidth;
      celebrationFlash.classList.add("show");

      createConfetti(42);

      setTimeout(function() {
        celebrationFlash.classList.remove("show");
      }, 900);
    }

    function createConfetti(amount) {
      celebrationLayer.innerHTML = "";

      const colors = [
        "#95d8bd",
        "#fff0a6",
        "#8be1ff",
        "#ffffff",
        "#78f0c0"
      ];

      for (let i = 0; i < amount; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.6 + Math.random() * 2.4) + "s";
        piece.style.animationDelay = (Math.random() * 0.25) + "s";
        piece.style.transform = "rotate(" + Math.floor(Math.random() * 360) + "deg)";
        celebrationLayer.appendChild(piece);
      }

      setTimeout(function() {
        celebrationLayer.innerHTML = "";
      }, 5200);
    }

    function resetGame() {
      foundCount = 0;
      score.textContent = "見つけた数：0 / 3";
      message.textContent = "画像の中をドラッグして探索しよう。似たキャラや小物にまぎれているかも……";
      clearBox.classList.remove("show");
      clearBox.style.display = "none";

      document.querySelectorAll(".hidden-character").forEach(function(character) {
        character.classList.remove("found");
        if (character.dataset.baseTransform) {
          character.style.transform = character.dataset.baseTransform;
        }
      });

      document.querySelectorAll(".target").forEach(function(target) {
        target.classList.remove("found");
      });

      celebrationLayer.innerHTML = "";
      celebrationFlash.classList.remove("show");

      randomizeHiddenCharacters();
      centerMap();
    }

    window.addEventListener("load", function() {
      randomizeHiddenCharacters();
      centerMap();
    });
  </script>

</body>
</html>
