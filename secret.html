<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フォレストソル秘密基地</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    if (sessionStorage.getItem("forestsol_secret_unlocked") !== "yes") {
      window.location.href = "index.html";
    }
  </script>


  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #07100d;
      color: #f2f2f2;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 24px 14px 14px;
      background:
        linear-gradient(rgba(3, 8, 6, 0.78), rgba(3, 8, 6, 0.95)),
        url("images/backgrounds/main-bg.png");
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid #2d5147;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.75);
    }

    .subtitle {
      margin-top: 10px;
      line-height: 1.7;
      color: #d8e8df;
      font-size: 14px;
    }

    .status-area {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .score {
      font-weight: bold;
      color: #95d8bd;
      line-height: 1.6;
    }

    .buttons {
      text-align: right;
      white-space: nowrap;
    }

    button,
    a.button {
      display: inline-block;
      margin: 3px;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: #1f6f58;
      color: #ffffff;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(0,0,0,0.3);
    }

    button:hover,
    a.button:hover {
      background: #2c8a6d;
    }

    .target-list {
      max-width: 1100px;
      margin: 0 auto 12px;
      padding: 0 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .target {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px;
      border-radius: 14px;
      background: rgba(16, 27, 24, 0.92);
      border: 1px solid #2d5147;
      font-size: 13px;
      font-weight: bold;
    }

    .target img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(0,0,0,0.35);
    }

    .target.found {
      color: #95d8bd;
      border-color: #95d8bd;
      box-shadow: 0 0 14px rgba(149,216,189,0.25);
    }

    .map-wrap {
      width: calc(100vw - 24px);
      height: calc(100vh - 230px);
      min-height: 430px;
      margin: 0 auto 14px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(149, 216, 189, 0.55);
      background: #000;
      box-shadow: 0 14px 38px rgba(0,0,0,0.5);
      position: relative;
    }

    .map-viewport {
      width: 100%;
      height: 100%;
      overflow: auto;
      cursor: grab;
      scroll-behavior: smooth;
      touch-action: pan-x pan-y;
    }

    .map-viewport.dragging {
      cursor: grabbing;
      scroll-behavior: auto;
    }

    .map-stage {
      position: relative;
      width: 2200px;
      height: 1238px;
      background-image: url("images/backgrounds/secret-map.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform-origin: top left;
    }

    .hidden-character {
position: absolute;
width: 62px;
height: 62px;
object-fit: contain;
cursor: pointer;
opacity: 0.9;
filter:
brightness(0.78)
saturate(0.9)
contrast(0.95)
drop-shadow(0 2px 4px rgba(0,0,0,0.55));
mix-blend-mode: normal;
transition:
transform 0.18s ease,
opacity 0.18s ease,
filter 0.18s ease;
user-select: none;
-webkit-user-drag: none;
z-index: 5;
}

.hidden-character:hover {
opacity: 1;
filter:
brightness(1.08)
saturate(1.15)
contrast(1.08)
drop-shadow(0 0 12px rgba(149,216,189,0.95));
}

.hidden-character.found {
opacity: 0;
pointer-events: none;
transform: scale(1.8) rotate(10deg);
}


    .hidden-character:hover {
      opacity: 0.95;
      transform: scale(1.22);
      filter:
        saturate(1.15)
        brightness(1.08)
        contrast(1.08)
        drop-shadow(0 0 12px rgba(149,216,189,0.95));
      mix-blend-mode: normal;
    }

    .hidden-character.found {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.8) rotate(10deg);
    }

    .sparkle {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
      background: radial-gradient(circle, rgba(149,216,189,0.95), rgba(149,216,189,0.25), transparent 70%);
      animation: sparkle 0.55s ease forwards;
    }

    @keyframes sparkle {
      from {
        opacity: 1;
        transform: scale(0.25);
      }

      to {
        opacity: 0;
        transform: scale(1.65);
      }
    }

    .message {
      max-width: 1100px;
      margin: 0 auto 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(149,216,189,0.35);
      line-height: 1.7;
      white-space: pre-wrap;
      box-sizing: border-box;
    }

    .clear-box {
      display: none;
      max-width: 1100px;
      margin: 0 auto 28px;
      padding: 22px;
      text-align: center;
      border-radius: 20px;
      background: rgba(12, 28, 24, 0.94);
      border: 1px solid #95d8bd;
      box-shadow: 0 0 28px rgba(149,216,189,0.25);
      line-height: 1.8;
      box-sizing: border-box;
    }

    .clear-box h2 {
      margin: 0 0 10px;
      color: #95d8bd;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      .status-area {
        grid-template-columns: 1fr;
      }

      .buttons {
        text-align: center;
      }

      .target-list {
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .target {
        display: block;
        text-align: center;
        font-size: 11px;
        padding: 7px;
      }

      .target img {
        width: 34px;
        height: 34px;
        display: block;
        margin: 0 auto 4px;
      }

      .map-wrap {
        width: calc(100vw - 14px);
        height: calc(100vh - 255px);
        min-height: 390px;
        border-radius: 14px;
      }

      .hidden-character {
        width: 54px;
        height: 54px;
      }

      .message {
        margin-left: 7px;
        margin-right: 7px;
        font-size: 13px;
      }

      .clear-box {
        margin-left: 7px;
        margin-right: 7px;
        font-size: 14px;
      }
    }
  </style>

</head>

<body>
  <header>
    <h1>フォレストソル秘密基地</h1>
    <div class="subtitle">
      森の遊び場にまぎれた3匹を探そう。<br>
      マウスでドラッグ、スマホなら指でスライドできるよ。
    </div>
  </header>

  <div class="status-area">
    <div class="score" id="score">見つけた数：0 / 3</div>

<div class="buttons">
  <button onclick="centerMap()">中央へ</button>
  <button onclick="resetGame()">もう一度</button>
  <a class="button" href="index.html">トップへ戻る</a>
</div>

  </div>

  <div class="target-list">
    <div class="target" id="target-yoshi">
      <img src="images/members/yoshi.png" alt="YOSHI">
      YOSHIを探せ
    </div>

<div class="target" id="target-wolfy">
  <img src="images/members/wolfy.png" alt="ウォルフィ">
  ウォルフィを探せ
</div>

<div class="target" id="target-kiara">
  <img src="images/members/kiara.png" alt="キアラ">
  キアラを探せ
</div>

  </div>

  <div class="map-wrap">
    <div class="map-viewport" id="mapViewport">
      <div class="map-stage" id="mapStage">

    <img
      class="hidden-character"
      id="yoshi"
      src="images/members/yoshi.png"
      alt="YOSHI"
      data-name="YOSHI"
      data-target="target-yoshi"
    >

    <img
      class="hidden-character"
      id="wolfy"
      src="images/members/wolfy.png"
      alt="ウォルフィ"
      data-name="ウォルフィ"
      data-target="target-wolfy"
    >

    <img
      class="hidden-character"
      id="kiara"
      src="images/members/kiara.png"
      alt="キアラ"
      data-name="キアラ"
      data-target="target-kiara"
    >

  </div>
</div>

  </div>

  <div class="message" id="message">
    画像の中をドラッグして探索しよう。似たキャラや小物にまぎれているかも……
  </div>

  <div class="clear-box" id="clearBox">
    <h2>クリア！</h2>
    <p>
      3匹全員を見つけた！<br>
      称号：森の遊び場を見抜いた者<br>
      ようこそ、フォレストソル秘密基地へ。
    </p>
  </div>

  <script>
    const viewport = document.getElementById("mapViewport");
    const stage = document.getElementById("mapStage");
    const score = document.getElementById("score");
    const message = document.getElementById("message");
    const clearBox = document.getElementById("clearBox");

    let foundCount = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let scrollLeft = 0;
    let scrollTop = 0;
    let moved = false;

    const hideSpots = [
      { left: 4, top: 69 },
      { left: 8, top: 41 },
      { left: 12, top: 84 },
      { left: 16, top: 27 },
      { left: 21, top: 58 },
      { left: 25, top: 74 },
      { left: 30, top: 35 },
      { left: 34, top: 82 },
      { left: 39, top: 49 },
      { left: 44, top: 23 },
      { left: 49, top: 67 },
      { left: 54, top: 38 },
      { left: 58, top: 80 },
      { left: 63, top: 54 },
      { left: 68, top: 29 },
      { left: 72, top: 72 },
      { left: 77, top: 44 },
      { left: 82, top: 84 },
      { left: 87, top: 35 },
      { left: 91, top: 63 }
    ];

    function shuffleArray(array) {
      const copy = array.slice();

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }

      return copy;
    }

    function randomizeHiddenCharacters() {
      const shuffledSpots = shuffleArray(hideSpots);
      const hiddenCharacters = document.querySelectorAll(".hidden-character");

      hiddenCharacters.forEach(function(character, index) {
        const spot = shuffledSpots[index];

        character.style.left = spot.left + "%";
        character.style.top = spot.top + "%";

        const rotate = Math.floor(Math.random() * 22) - 11;
        const scale = 0.92 + Math.random() * 0.18;

        character.style.transform =
          "rotate(" + rotate + "deg) scale(" + scale + ")";
      });
    }

    function centerMap() {
      viewport.scrollLeft = (stage.offsetWidth - viewport.clientWidth) / 2;
      viewport.scrollTop = (stage.offsetHeight - viewport.clientHeight) / 2;
    }

    viewport.addEventListener("mousedown", function(event) {
      isDragging = true;
      moved = false;
      viewport.classList.add("dragging");

      startX = event.pageX - viewport.offsetLeft;
      startY = event.pageY - viewport.offsetTop;
      scrollLeft = viewport.scrollLeft;
      scrollTop = viewport.scrollTop;
    });

    viewport.addEventListener("mouseleave", function() {
      isDragging = false;
      viewport.classList.remove("dragging");
    });

    viewport.addEventListener("mouseup", function() {
      isDragging = false;
      viewport.classList.remove("dragging");
    });

    viewport.addEventListener("mousemove", function(event) {
      if (!isDragging) return;

      event.preventDefault();

      const x = event.pageX - viewport.offsetLeft;
      const y = event.pageY - viewport.offsetTop;

      const walkX = (x - startX) * 1.2;
      const walkY = (y - startY) * 1.2;

      if (Math.abs(walkX) > 4 || Math.abs(walkY) > 4) {
        moved = true;
      }

      viewport.scrollLeft = scrollLeft - walkX;
      viewport.scrollTop = scrollTop - walkY;
    });

    document.querySelectorAll(".hidden-character").forEach(function(character) {
      character.addEventListener("click", function(event) {
        if (moved) {
          event.preventDefault();
          return;
        }

        findCharacter(character);
      });
    });

    function findCharacter(character) {
      if (character.classList.contains("found")) return;

      character.classList.add("found");
      foundCount++;

      const name = character.dataset.name;
      const targetId = character.dataset.target;
      const target = document.getElementById(targetId);

      if (target) {
        target.classList.add("found");
      }

      score.textContent = "見つけた数：" + foundCount + " / 3";
      message.textContent = name + "を見つけた！\nまだ森のどこかに仲間が隠れている……";

      createSparkle(character);

      if (foundCount >= 3) {
        message.textContent = "3匹全員見つけた！\n森の奥の秘密基地が開いた……";
        clearBox.style.display = "block";
      }
    }

    function createSparkle(character) {
      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";

      const left = character.offsetLeft + character.offsetWidth / 2 - 35;
      const top = character.offsetTop + character.offsetHeight / 2 - 35;

      sparkle.style.left = left + "px";
      sparkle.style.top = top + "px";

      stage.appendChild(sparkle);

      setTimeout(function() {
        sparkle.remove();
      }, 650);
    }

    function resetGame() {
      foundCount = 0;
      score.textContent = "見つけた数：0 / 3";
      message.textContent = "画像の中をドラッグして探索しよう。似たキャラや小物にまぎれているかも……";
      clearBox.style.display = "none";

      document.querySelectorAll(".hidden-character").forEach(function(character) {
        character.classList.remove("found");
      });

      document.querySelectorAll(".target").forEach(function(target) {
        target.classList.remove("found");
      });

      randomizeHiddenCharacters();
      centerMap();
    }

    window.addEventListener("load", function() {
      randomizeHiddenCharacters();
      centerMap();
    });
  </script>

</body>
</html>
