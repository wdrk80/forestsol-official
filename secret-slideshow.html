<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Forestsol Secret Animation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      font-family: sans-serif;
    }

    .slideshow {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.015);
      transition: opacity 0.06s linear;
      user-select: none;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
    }

    .fade-out {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.7s ease;
    }

    .fade-out.show {
      opacity: 1;
    }

    .skip-hint {
      position: fixed;
      right: 16px;
      bottom: 14px;
      z-index: 20;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      letter-spacing: 0.04em;
      user-select: none;
    }

    @media (max-width: 700px) {
      .slide {
        object-fit: cover;
      }

      .skip-hint {
        font-size: 11px;
        right: 10px;
        bottom: 10px;
      }
    }
  </style>

</head>

<body>
  <main class="slideshow">
    <img class="slide active" src="images/secret/slide/1.png" alt="">
    <img class="slide" src="images/secret/slide/2.png" alt="">
    <img class="slide" src="images/secret/slide/3.png" alt="">
    <img class="slide" src="images/secret/slide/4.png" alt="">
    <img class="slide" src="images/secret/slide/5.png" alt="">
    <img class="slide" src="images/secret/slide/6.png" alt="">
    <img class="slide" src="images/secret/slide/7.png" alt="">
    <img class="slide" src="images/secret/slide/8.png" alt="">
    <img class="slide" src="images/secret/slide/9.png" alt="">
    <img class="slide" src="images/secret/slide/10.png" alt="">
    <img class="slide" src="images/secret/slide/11.png" alt="">
  </main>

  <div class="fade-out" id="fadeOut"></div>
  <div class="skip-hint">click / tap to skip</div>

  <script>
    const slides = Array.from(document.querySelectorAll(".slide"));
    const fadeOut = document.getElementById("fadeOut");

    let current = 0;

    // 早めの再生速度。数字を小さくすると速く、大きくすると遅くなる
    const frameTime = 170;

    // 最後の画像を少しだけ長く見せる時間
    const lastFrameWait = 650;

    // メインページの移動先
    const nextPage = "index.html";

    function showSlide(index) {
      slides[current].classList.remove("active");
      current = index;
      slides[current].classList.add("active");
    }

    function goMainPage() {
      fadeOut.classList.add("show");

      setTimeout(() => {
        window.location.href = nextPage;
      }, 700);
    }

    function startSlideshow() {
      const timer = setInterval(() => {
        if (current >= slides.length - 1) {
          clearInterval(timer);

          setTimeout(() => {
            goMainPage();
          }, lastFrameWait);

          return;
        }

        showSlide(current + 1);
      }, frameTime);
    }

    function preloadImages() {
      slides.forEach((img) => {
        const preload = new Image();
        preload.src = img.src;
      });
    }

    // クリック・タップでスキップしてメインページへ
    window.addEventListener("click", goMainPage);
    window.addEventListener("touchstart", goMainPage);

    // 読み込み後に自動再生
    window.addEventListener("load", () => {
      preloadImages();

      setTimeout(() => {
        startSlideshow();
      }, 250);
    });
  </script>

</body>
</html>
